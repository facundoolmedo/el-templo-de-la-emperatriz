version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=templo_user
      - DB_PASS=templo_pass
      - DB_NAME=templo_db
      - JWT_SECRET=super_secret_jwt_key_12345
      - WHATSAPP_PHONE=123456789
      - CONTACT_RECIPIENT_EMAIL=admin@templo.com
      - SMTP_HOST=smtp.example.com
      - SMTP_PORT=587
      - SMTP_SECURE=tls
      - SMTP_USER=user@example.com
      - SMTP_PASS=secret
      - SMTP_FROM=user@example.com
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: templo_db
      MYSQL_USER: templo_user
      MYSQL_PASSWORD: templo_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
