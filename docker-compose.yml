version: '3.9'

services:
  templo-backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - WHATSAPP_PHONE=${WHATSAPP_PHONE}
      - CONTACT_RECIPIENT_EMAIL=${CONTACT_RECIPIENT_EMAIL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    volumes:
      - ./db:/app/db
      - ./middleware:/app/middleware
      - ./public:/app/public
      - ./routes:/app/routes
      - ./scripts:/app/scripts
    restart: unless-stopped
    # Descomentar si necesitas conectar con otras bases de datos
    # depends_on:
    #   - db

